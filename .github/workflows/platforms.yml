name: Platforms
on:
  push:
    branches:
      - main
      - master
  pull_request:
jobs:
  platforms:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            python-version: "3.6"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run script
        run: |
          python3 src/kvakk_git_tools/ssb_gitconfig.py --test
