name: Platforms
on:
  push:
    branches:
      - main
      - master
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.13

      - name: Install Poetry
        run: |
          pipx install --pip-args "-c ${{ github.workspace }}/.github/workflows/constraints.txt" poetry
          poetry --version

      - name: Build wheel (Python 3.13)
        run: |
          poetry build

      - name: Test in Python 3.6
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            python:3.6-buster \
            bash -c "
              pip install dist/*.whl &&
              python3 src/kvakk_git_tools/ssb_gitconfig.py --test
            "
